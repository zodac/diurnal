services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lifetracker_test
      POSTGRES_USER: lifetracker
      POSTGRES_PASSWORD: lifetracker
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data   # in-memory storage — wiped on container restart, fast I/O
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifetracker -d lifetracker_test"]
      interval: 5s
      timeout: 3s
      retries: 5
