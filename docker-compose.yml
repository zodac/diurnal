networks:
  diurnal:
    name: diurnal
    driver: bridge

services:

  diurnal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diurnal
    hostname: diurnal
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      DB_HOST: diurnal-db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-diurnal_db}
      DB_USER: ${DB_USER:-diurnal_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      TZ: ${TZ:-UTC}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # DB query tracing. Independent of LOG_LEVEL (which only covers net.zodac.diurnal): set to TRACE
      # to log every SQL statement + bound parameters the app issues to Postgres. Leave at WARN (off)
      # in production — it is verbose and can surface parameter values in the logs.
      DB_LOG_LEVEL: ${DB_LOG_LEVEL:-WARN}
      # This stack runs behind Traefik, which sets/strips X-Forwarded-*, so trust those headers
      # (needed for https:// OIDC redirect URIs and Secure cookies). Disabled by default in
      # application.properties — only safe because a trusted proxy fronts the app here.
      TRUST_X_FORWARDED_HEADERS: ${TRUST_X_FORWARDED_HEADERS:-true}
      PASSWORD_AUTH_ENABLED: ${PASSWORD_AUTH_ENABLED:-true}
      ENABLE_REGISTRATION: ${ENABLE_REGISTRATION:-true}
      # Sessions are server-side (the sessions table); tune the lifetimes if desired (ISO-8601):
      SESSION_IDLE_TIMEOUT: ${SESSION_IDLE_TIMEOUT:-P30D}
      SESSION_ABSOLUTE_LIFETIME: ${SESSION_ABSOLUTE_LIFETIME:-P90D}
      # OIDC
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-diurnal}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-your identity provider}
      OIDC_AUTO_REDIRECT: ${OIDC_AUTO_REDIRECT:-false}
      OIDC_ADMIN_GROUP: ${OIDC_ADMIN_GROUP:-diurnal-admins}
      OIDC_USER_GROUP: ${OIDC_USER_GROUP:-diurnal-users}
      OIDC_LOGOUT_URL: ${OIDC_LOGOUT_URL}
    networks:
      - diurnal
    depends_on:
      diurnal-db:
        condition: service_healthy
    labels:
      # Reverse proxy config
      traefik.enable: "true"
      traefik.http.routers.diurnal.rule: "Host(`diurnal.${DOMAIN_NAME}`)"
      traefik.http.routers.diurnal.entrypoints: "websecure"
      traefik.http.routers.diurnal.tls: "true"
      traefik.http.routers.diurnal.middlewares: "no-forward-auth@file"
      traefik.http.services.diurnal.loadbalancer.server.port: "8080"

  diurnal-db:
    image: postgres:18.4-alpine
    container_name: diurnal-db
    hostname: diurnal-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-UTC}
      POSTGRES_DB: ${DB_NAME:-diurnal_db}
      POSTGRES_USER: ${DB_USER:-diurnal_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - diurnal-db_data:/var/lib/postgresql/
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-diurnal_user} -d ${DB_NAME:-diurnal_db}" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s
      start_interval: 5s
    networks:
      - diurnal

volumes:
  diurnal-db_data:
    name: diurnal-db_data
