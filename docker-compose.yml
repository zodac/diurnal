networks:
  app:
    name: app
    driver: bridge

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      POSTGRES_DB: ${DB_NAME:-lifetracker}
      POSTGRES_USER: ${DB_USER:-lifetracker}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lifetracker} -d ${DB_NAME:-lifetracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-lifetracker}
      DB_USER: ${DB_USER:-lifetracker}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      TZ: ${TZ:-UTC}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PASSWORD_AUTH_ENABLED: "true"
      ENABLE_REGISTRATION: ${ENABLE_REGISTRATION:-true}
      # Session cookie encryption — must be at least 16 chars, keep secret
      SESSION_ENCRYPTION_KEY: ${SESSION_ENCRYPTION_KEY:?SESSION_ENCRYPTION_KEY must be set}
      # JWT keys are stored in ./secrets/ — auto-generated on first start if absent (see JwtKeyProvisioner)
      JWT_PUBLIC_KEY_LOCATION: /run/secrets/jwt-public.pem
      JWT_PRIVATE_KEY_LOCATION: /run/secrets/jwt-private.pem
      # OIDC — set OIDC_ENABLED=true and configure the values below
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-life-tracker}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-your identity provider}
      OIDC_AUTO_REDIRECT: ${OIDC_AUTO_REDIRECT:-false}
      OIDC_ADMIN_GROUP: ${OIDC_ADMIN_GROUP:-life-tracker-admins}
      OIDC_USER_GROUP: ${OIDC_USER_GROUP:-life-tracker-users}
      OIDC_LOGOUT_URL: ${OIDC_LOGOUT_URL}
    networks:
      - app
    volumes:
      # Writable so the app can generate the keypair on first start; reused on later starts.
      - ./secrets:/run/secrets
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
