name: life-tracker-dev

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lifetracker
      POSTGRES_USER: lifetracker
      POSTGRES_PASSWORD: lifetracker
    ports:
      - "5432:5432"
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifetracker -d lifetracker"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  dev_postgres_data:
