name: Build and Publish Docker Image

# Never scheduled — only a push to an image-affecting file on master, or a manual dispatch.
on:
  push:
    branches: [ master ]
    # Scope: only files that end up in (or change) the published production image
    paths:
      - 'Dockerfile'
      - 'pom.xml'
      - 'frontend/**' # the npm manifest, Tailwind config and CSS source all feed the image's stylesheet
      - 'src/**'
      - '!src/test/**' # test code never reaches the published image (packaged with -DskipTests)
      - 'VERSION'
  workflow_dispatch: # allows manual trigger

jobs:
  # Resolve the release version and decide whether the Docker image should be published. A GitHub
  # release is always created; only the Docker image publish is gated — versions below 1.0.0 are
  # pre-releases and their image is not pushed.
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_publish: ${{ steps.version.outputs.should_publish }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Read version and check release eligibility
        id: version
        run: |
          version="$(cat VERSION)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Read version: ${version}"

          # Push the Docker image only for stable releases (>= 1.0.0). Major version 0 == pre-release.
          major="${version%%.*}"
          if [ "${major}" -ge 1 ] 2>/dev/null; then
            echo "should_publish=true" >> "${GITHUB_OUTPUT}"
          else
            echo "should_publish=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::Version ${version} is a pre-release (< 1.0.0); the GitHub release will still be created, but the Docker image will not be pushed."
          fi

  # Full CI gate (lints + unit + IT + E2E + deployment-smoke) before anything is released or published.
  test:
    name: Test latest software
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    # Fold SonarQube analysis into the existing full gate (no duplicate build): SONARQUBE_ANALYSIS=true
    # makes lint_and_tests.sh append -Dsonarqube to its `mvn clean install -Dall`, and the parent-pom
    # reads the host URL + token straight from these env vars (sonar.host.url / sonar.token). Because a
    # release only ever runs on a master push / manual dispatch, every release is analysed and uploaded.
    env:
      SONARQUBE_ANALYSIS: 'true'
      SONARQUBE_HOST_URL: ${{ secrets.SONARQUBE_HOST_URL }}
      SONARQUBE_PAT: ${{ secrets.SONARQUBE_RW_PAT }}

    steps:
      # submodules: code-quality-config holds the linter configs used by the -Dall gate.
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '26.4.0'

      - name: Setup Maven Action
        uses: s4u/setup-maven-action@v1.20.0
        with:
          checkout-fetch-depth: 0
          java-distribution: 'temurin'
          java-version: '26'
          maven-version: '3.9.16'

      # Node deps: the POM's css-build exec runs `npm run css` in frontend/; the E2E run uses tests/ deps + browsers.
      - name: Install CSS build dependencies
        working-directory: frontend
        run: npm ci

      # Cache the downloaded Playwright browser binaries (the slow part). Keyed on the E2E lockfile so a
      # Playwright version bump invalidates it. OS-level deps (`--with-deps`) are NOT cached, so on a hit
      # we still run `install-deps` below.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('tests/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install E2E dependencies and browsers
        working-directory: tests
        run: |
          npm ci
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps
          else
            npx playwright install --with-deps
          fi

      # Executes the full gate one place.
      # Needs the host toolchain set up above: JDK+Maven, Node deps, Playwright, and Docker.
      - name: Run full test and lint gate
        # Perf-tier calibration for the shared GitHub runner. ubuntu-latest is a 2-vCPU box running the
        # app, Postgres AND the k6 generator on the same cores, so the dev-workstation load-shape drives
        # it into queueing collapse (p95s of seconds that are pure queue time, not service time). Offer a
        # lighter load so we measure service time, and widen the latency budget with PERF_P95_TOLERANCE —
        # while the error-rate budgets stay strict, so a genuinely broken path still fails. These are
        # forwarded through lint_and_tests.sh -> run-perf.sh into the k6 container; tune against the
        # observed CI numbers. (Only the `perf` step reads them; every other step ignores them.)
        env:
          PERF_RATE: "5"
          PERF_VUS: "10"
          PERF_P95_TOLERANCE: "8"
        run: .github/scripts/lint_and_tests.sh -v -e

  # Always tag the release, publish a GitHub Release and bump the patch version for the next cycle.
  # The Docker image is built & pushed only for stable (>= 1.0.0) versions. Runs after `test` is green.
  publish:
    name: Publish release
    needs: [ version, test ]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # push the version-bump commit + release tag, create the GitHub Release
    env:
      VERSION: ${{ needs.version.outputs.version }}
      SHOULD_PUBLISH: ${{ needs.version.outputs.should_publish }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0 # need full history + tags for the changelog and tagging

      - name: Fetch tags
        run: git fetch --tags

      - name: Configure git user
        run: |
          git config user.name "publisher"
          git config user.email "github-actions@github.com"

      # Maven is always needed: the version-bump step (bump_version.sh) runs `mvn versions:set` on
      # every release, pre-release or not. Only the image-specific Maven step below is gated. Pinning
      # it here (rather than relying on the runner's pre-installed Maven) keeps the toolchain
      # consistent with the `test` job.
      - name: Setup Maven Action
        uses: s4u/setup-maven-action@v1.20.0
        with:
          checkout-fetch-depth: 0
          java-distribution: 'temurin'
          java-version: '26'
          maven-version: '3.9.16'

      - name: Set Maven version from VERSION file
        run: mvn versions:set -DnewVersion="${VERSION}" -DgenerateBackupPoms=false

      - name: Set up Docker Buildx
        if: needs.version.outputs.should_publish == 'true'
        uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to Docker Hub
        if: needs.version.outputs.should_publish == 'true'
        uses: docker/login-action@v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: needs.version.outputs.should_publish == 'true'
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          cache-from: type=registry,ref=zodac/diurnal:cache
          cache-to: type=registry,ref=zodac/diurnal:cache,mode=max
          tags: |
            zodac/diurnal:${{ env.VERSION }}
            zodac/diurnal:latest

      - name: Get previous tag
        id: prev_tag
        run: |
          # Latest existing tag (empty on the very first release; the changelog script handles that).
          prev_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          echo "prev_tag=${prev_tag}" >> "${GITHUB_OUTPUT}"

      - name: Generate categorised changelog
        run: .github/scripts/generate_changelog.sh "${{ steps.prev_tag.outputs.prev_tag }}"

      # Assemble the release body: optional RELEASE_NOTES.md (if non-empty) + Docker pull line +
      # the categorised changelog (exported as env.changelog_content by the step above). Exposed as
      # steps.release_body.outputs.body for the Create GitHub Release step.
      - name: Build release body
        id: release_body
        env:
          CHANGELOG_CONTENT: ${{ env.changelog_content }}
        run: .github/scripts/generate_github_release_content.sh "${VERSION}" "${{ steps.prev_tag.outputs.prev_tag }}"

      - name: Tag the released version
        run: git tag "${VERSION}"

      - name: Bump patch version in VERSION file for the next cycle
        run: .github/scripts/bump_version.sh "${VERSION}"

      - name: Push version-bump commit and release tag
        uses: ad-m/github-push-action@v1.3.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: master
          tags: true

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1.21.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: v${{ env.VERSION }}
          tag: ${{ env.VERSION }}
          body: ${{ steps.release_body.outputs.body }}
          # A sub-1.0.0 version is a pre-release: flag it as such and don't mark it "Latest".
          prerelease: ${{ needs.version.outputs.should_publish != 'true' }}
          makeLatest: ${{ needs.version.outputs.should_publish == 'true' }}

      - name: Summary
        run: |
          echo "Created GitHub release for version: ${VERSION}"
          if [ "${SHOULD_PUBLISH}" = "true" ]; then
            echo "Published Docker image. Pull it using:"
            echo "  docker pull zodac/diurnal:${VERSION}"
          else
            echo "Skipped Docker image publish (pre-release version < 1.0.0)."
          fi
