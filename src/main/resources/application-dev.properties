# Dev-profile overrides (mvn quarkus:dev). Loaded only when the "dev" profile is active, on top of
# the base application.properties. Keys here need no "%dev." prefix.

# --- HTTP ---
# Dev mode uses a non-production port so a local dev instance can run alongside the production
# container (or an E2E test run) without clashing on 8080.
quarkus.http.port=8081

# --- Database ---
# Connect to the PostgreSQL started by docker-compose.dev.yml (no Testcontainers).
quarkus.datasource.devservices.enabled=false
quarkus.datasource.username=lifetracker
quarkus.datasource.password=lifetracker
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/lifetracker

# --- Logging ---
quarkus.log.category."dev.lifetracker".level=${LOG_LEVEL:DEBUG}

# --- OpenAPI (dev only) ---
quarkus.swagger-ui.always-include=true
