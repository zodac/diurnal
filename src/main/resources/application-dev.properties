# Dev-profile overrides (mvn quarkus:dev). Loaded only when the "dev" profile is active, on top of
# the base application.properties. Keys here need no "%dev." prefix.

# --- HTTP ---
# Dev mode uses a non-production port so a local dev instance can run alongside the production
# container (or an E2E test run) without clashing on 8080.
quarkus.http.port=8081

# Never cache static assets in dev. Prod content-hashes the stylesheet/script filenames and serves them
# `immutable` (see application.properties), but dev serves the un-hashed app.css / htmx.min.js under
# stable URLs and rebuilds the CSS via `npm run css` / hot reload — so `no-store` guarantees every reload
# fetches the freshest file with no manual hard-refresh.
quarkus.http.filter.app-css.header.Cache-Control=no-store
quarkus.http.filter.app-js.header.Cache-Control=no-store
quarkus.http.filter.app-assets.header.Cache-Control=no-store

# --- Database ---
# Connect to the PostgreSQL started by docker-compose.dev.yml (no Testcontainers).
quarkus.datasource.devservices.enabled=false
quarkus.datasource.username=diurnal_user
quarkus.datasource.password=diurnal_password
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/diurnal_db

# --- Logging ---
quarkus.log.category."net.zodac.diurnal".level=${LOG_LEVEL:DEBUG}

# --- Auth ---
# Pin registration ON for dev regardless of any ENABLE_REGISTRATION/PASSWORD_AUTH_ENABLED set in the
# environment, so a local dev instance can always create accounts (web + /api/auth/register).
password.auth.enabled=true
registration.enabled=true
