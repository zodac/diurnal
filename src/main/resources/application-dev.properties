# Dev-profile overrides (mvn quarkus:dev). Loaded only when the "dev" profile is active, on top of
# the base application.properties. Keys here need no "%dev." prefix.

# --- HTTP ---
# Dev mode uses a non-production port so a local dev instance can run alongside the production
# container (or an E2E test run) without clashing on 8080.
quarkus.http.port=8081

# Never cache static assets in dev. Prod content-hashes the stylesheet filename and serves it
# `immutable` (see application.properties), but dev serves the un-hashed app.css under a stable URL
# and rebuilds it via `npm run css` / hot reload — so `no-store` guarantees every reload fetches the
# freshest file with no manual hard-refresh.
quarkus.http.filter.app-css.header.Cache-Control=no-store
quarkus.http.filter.app-assets.header.Cache-Control=no-store

# --- Database ---
# Connect to the PostgreSQL started by docker-compose.dev.yml (no Testcontainers).
quarkus.datasource.devservices.enabled=false
quarkus.datasource.username=diurnal_user
quarkus.datasource.password=diurnal_password
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/diurnal_db

# --- Logging ---
quarkus.log.category."net.zodac.diurnal".level=${LOG_LEVEL:DEBUG}

# --- Auth ---
# Pin registration ON for dev regardless of any ENABLE_REGISTRATION/PASSWORD_AUTH_ENABLED set in the
# environment, so a local dev instance can always create accounts (web + /api/auth/register).
password.auth.enabled=true
registration.enabled=true

# --- JWT signing keys ---
# The base default (jwt-keys/*.pem) is a relative classpath location, which JwtKeyProvisioner skips
# (it only provisions absolute filesystem paths). Those PEMs are gitignored, so a fresh clone that has
# never generated them 500s every authenticated request with "SRJWT02002 ... no protocol:
# jwt-keys/public.pem". Point both halves at an absolute path under the gitignored project `secrets/`
# dir so the provisioner auto-generates a keypair on first `quarkus:dev` start. `secrets/` sits outside
# the src/ tree the live-reload watcher scans (no reload loop) and persists across restarts, so tokens
# issued in one dev session stay valid across the next — no committed secrets, no manual step.
mp.jwt.verify.publickey.location=${user.dir}/secrets/jwt-public.pem
smallrye.jwt.sign.key.location=${user.dir}/secrets/jwt-private.pem
