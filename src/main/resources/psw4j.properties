# password4j autoloads this file from the classpath root. We drive Argon2id entirely through explicit
# parameters in Argon2Config/Passwords, so the only global property password4j needs is the random
# per-password salt length used when Argon2Function.hash(...) generates a salt. Pinning it to 64 — the
# library's own default — silences the start-up "Global salt length is not defined" warning without
# changing any hashing behaviour (the salt is embedded in each PHC hash, so verification is unaffected).
global.salt.length=64
