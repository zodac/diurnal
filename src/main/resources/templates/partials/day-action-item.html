<div id="log-{date}-{action.id}"
     class="flex items-center justify-between px-2 py-2 rounded-lg hover:bg-surface-muted transition-colors">

    <div class="flex items-center gap-2 min-w-0 flex-1">
        <span class="swatch swatch-sm" style="background-color: {action.colour}"></span>
        <span class="text-sm text-ink truncate">{action.name}</span>
    </div>

    <div class="flex items-center gap-0.5 flex-shrink-0">
        <!-- Decrement -->
        <button {#if count == 0}disabled{/if}
                hx-post="/logs/{date}/{action.id}/decrement"
                hx-target="#log-{date}-{action.id}"
                hx-swap="outerHTML"
                title="Decrease"
                class="w-7 h-7 flex items-center justify-center rounded text-lg font-medium transition-colors
                       {#if count == 0}text-ink-muted opacity-40 cursor-not-allowed{#else}text-ink-muted hover:bg-surface-muted hover:text-ink{/if}">
            −
        </button>

        <!-- Count -->
        <span class="w-7 text-center text-sm font-semibold tabular-nums select-none
                     {#if count == 0}text-ink-muted{#else}text-ink{/if}">
            {count}
        </span>

        <!-- Increment -->
        <button {#if count >= 255}disabled{/if}
                hx-post="/logs/{date}/{action.id}/increment"
                hx-target="#log-{date}-{action.id}"
                hx-swap="outerHTML"
                title="{#if count >= 255}Maximum reached{#else}Increase{/if}"
                class="w-7 h-7 flex items-center justify-center rounded text-lg font-medium transition-colors
                       {#if count >= 255}text-ink-muted opacity-40 cursor-not-allowed{#else}text-brand hover:bg-surface-muted{/if}">
            +
        </button>
    </div>
</div>
