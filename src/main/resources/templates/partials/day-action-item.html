<div class="day-item flex items-center justify-between px-2 py-2 rounded-lg hover:bg-surface-muted transition-colors">

    <div class="flex items-center gap-2 min-w-0 flex-1">
        <span class="swatch swatch-sm shrink-0" style="background-color: {action.colour}"></span>
        <span class="text-[0.8125rem] text-ink truncate">{action.name}</span>
    </div>

    <div class="flex items-center gap-0.5 shrink-0">
        <!-- Decrement: hidden (not just disabled) at 0, since there is nothing to decrement.
             `invisible` keeps the cell's width so the count stays put. -->
        <button hx-post="/logs/{date}/{action.id}/decrement"
                hx-vals='{"amount": 1}'
                hx-target="#log-{date}-{action.id}"
                hx-swap="innerHTML"
                aria-label="Decrease"
                class="w-7 h-7 flex items-center justify-center rounded text-lg font-medium transition-colors
                       text-ink-muted hover:bg-brand hover:text-on-brand active:bg-brand-strong
                       {#if count == 0}invisible{/if}">
            −
        </button>

        <!-- Count (editable) -->
        <input type="text" inputmode="numeric" maxlength="3"
               name="count"
               value="{count}"
               hx-post="/logs/{date}/{action.id}/set"
               hx-trigger="change"
               hx-target="#log-{date}-{action.id}"
               hx-swap="innerHTML"
               class="w-10 h-7 text-center text-sm font-semibold tabular-nums
                      bg-transparent border border-line rounded
                      hover:border-brand focus:border-brand focus:outline-hidden
                      {#if count == 0}text-ink-muted{#else}text-ink{/if}">

        <!-- Increment: hidden (not just disabled) at the 999 cap, since it can go no higher.
             `invisible` keeps the cell's width so the count stays put. -->
        <button hx-post="/logs/{date}/{action.id}/increment"
                hx-vals='{"amount": 1}'
                hx-target="#log-{date}-{action.id}"
                hx-swap="innerHTML"
                aria-label="Increase"
                class="w-7 h-7 flex items-center justify-center rounded text-lg font-medium transition-colors
                       text-brand hover:bg-brand hover:text-on-brand active:bg-brand-strong
                       {#if count >= 999}invisible{/if}">
            +
        </button>

        <!-- Delete entry: wrapped in .dt-actions so the button gets the same min-width as the
             confirm state's Cancel, keeping Cancel in exactly the same position on swap.
             Always rendered; invisible (not just opacity-0) when there is no log to erase. -->
        <div class="dt-actions ml-[0.2rem]">
            <button hx-get="/logs/{date}/{action.id}/confirm-delete"
                    hx-target="#log-{date}-{action.id}"
                    hx-swap="innerHTML"
                    aria-label="Erase this action's entries"
                    class="dt-btn dt-btn-delete {#if count == 0}invisible{#else}day-item-delete{/if}">
                Erase
            </button>
        </div>
    </div>
</div>
