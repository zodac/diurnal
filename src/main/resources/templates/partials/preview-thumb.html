{!
  A fixed-size, top-cropped screenshot thumbnail. See `.preview-thumb` in app.css for sizing.
  Params:
    alt     - image alt text
    imgBase - image base name without extension, e.g. "page-nova-full-dark"
!}
<span class="preview-thumb">
    <img data-src="/img/settings/{imgBase}.webp" alt="{alt}" class="preview-img">
</span>
