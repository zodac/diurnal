<tr id="action-{action.id}" class="dt-row-confirm">
    <td colspan="3" class="dt-confirm-cell">
        <div class="flex items-center gap-3">
            <span class="dt-swatch" style="background-color: {action.colour}"></span>
            <span class="flex-1 text-sm font-medium truncate">{action.name}</span>
            <span class="dt-confirm-prompt">Delete this action?</span>
            <!-- Destructive action sits to the left, away from where the "Delete" trigger was clicked. -->
            <button type="button"
                    hx-post="/actions/{action.id}/delete"
                    hx-target="#action-{action.id}"
                    hx-swap="outerHTML"
                    class="dt-btn dt-btn-danger">
                Delete
            </button>
            <!-- Cancel sits furthest right, where the original "Delete" button was, so a repeat
                 click lands here and safely dismisses instead of confirming. -->
            <button type="button"
                    hx-get="/actions/{action.id}"
                    hx-target="#action-{action.id}"
                    hx-swap="outerHTML"
                    class="dt-btn dt-btn-cancel ml-4">
                Cancel
            </button>
        </div>
    </td>
</tr>
