<div class="flex items-center justify-between mb-4">
    <h3 class="text-base font-medium text-ink">{dateLabel}</h3>
</div>

{#if future}
<!-- Future dates cannot be logged against -->
<p class="text-sm text-ink-muted italic text-center py-4">
    Actions can't be logged for a future date.
</p>
{#else}
<!-- Search bar -->
<div class="mb-4">
    <input type="text"
           id="day-search-input"
           name="q"
           placeholder="Search actions…"
           hx-get="/logs/day/{date}/list?page=1"
           hx-target="#day-actions-list"
           hx-trigger="input changed delay:300ms"
           hx-on="htmx:configRequest: event.detail.parameters.q = document.getElementById('day-search-input').value"
           class="form-input w-full">
</div>

<!-- Actions list -->
<div id="day-actions-list" class="flex flex-col gap-1" style="overflow-anchor: none;">
    {#include partials/day-actions-list date=date page=page /}
</div>
{/if}
