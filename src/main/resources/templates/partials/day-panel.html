<div class="flex items-center justify-between mb-4">
    <h3 class="text-base font-medium text-gray-900 dark:text-gray-50">{dateLabel}</h3>
</div>

{#if future}
<!-- Future dates cannot be logged against -->
<p class="text-sm text-gray-500 dark:text-gray-400 italic text-center py-4">
    Actions can't be logged for a future date.
</p>
{#else}
<!-- Search bar -->
<div class="mb-4">
    <input type="text"
           id="day-search-input"
           name="q"
           placeholder="Search actions…"
           hx-get="/logs/day/{date}/list?page=1"
           hx-target="#day-actions-list"
           hx-trigger="input changed delay:300ms"
           hx-on="htmx:configRequest: event.detail.parameters.q = document.getElementById('day-search-input').value"
           class="w-full rounded-lg border border-gray-300 dark:border-gray-600 px-3 py-2 text-sm
                  bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50
                  focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
</div>

<!-- Actions list -->
<div id="day-actions-list" class="flex flex-col gap-1">
    {#include partials/day-actions-list date=date page=page /}
</div>
{/if}
