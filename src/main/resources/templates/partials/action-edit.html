<tr id="action-{action.id}" class="dt-row-edit">
    <td colspan="3" class="dt-edit-cell">
        <form hx-post="/actions/{action.id}"
              hx-target="#action-{action.id}"
              hx-swap="outerHTML"
              class="flex items-center gap-3">
            <input type="color"
                   name="colour"
                   value="{action.colour}"
                   class="dt-color-input"
                   title="Pick a colour">
            <input type="text"
                   name="name"
                   value="{action.name}"
                   required
                   maxlength="100"
                   class="dt-text-input flex-1 min-w-0">
            <button type="submit" class="dt-btn dt-btn-save flex-shrink-0">Save</button>
            <button type="button"
                    hx-get="/actions/{action.id}"
                    hx-target="#action-{action.id}"
                    hx-swap="outerHTML"
                    class="dt-btn dt-btn-cancel flex-shrink-0">Cancel</button>
        </form>
    </td>
</tr>
