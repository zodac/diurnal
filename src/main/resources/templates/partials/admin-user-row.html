<tr id="user-row-{u.id}" class="dt-row">
    <td class="dt-cell truncate max-w-xs">{u.email}</td>
    <td class="dt-cell">{u.displayName}</td>
    <td class="dt-cell">
        <span data-dt-view class="flex items-center gap-2">
            <span class="dt-badge {#if u.role == 'admin'}dt-badge-admin{/if}">{u.roleName}</span>
        </span>
        <span data-dt-edit class="hidden flex items-center gap-2">
            <form id="user-form-{u.id}"
                  hx-post="/admin/users/{u.id}/role"
                  hx-target="#admin-users-list"
                  hx-swap="innerHTML">
                <select name="role" class="dt-select">
                    {#for option in role:options}
                    <option value="{option.storageValue}" {#if u.role == option.storageValue}selected{/if}>{option.displayName}</option>
                    {/for}
                </select>
            </form>
        </span>
    </td>
    <td class="dt-cell dt-cell-muted">{u.createdLabel}</td>
    <td class="dt-cell dt-cell-muted">{u.lastLoginLabel}</td>
    {#include partials/dt-row-actions id=u.id rowPrefix="user-row" formPrefix="user-form" confirmBase="/admin/users" /}
</tr>
