{#include layout.html}

{#body}
<div class="min-h-screen flex flex-col">

    <!-- Navigation -->
    {#include partials/navbar active='actions' /}

    <!-- Content -->
    <main class="flex-1 max-w-2xl mx-auto w-full px-4 py-8">
        <h2 class="text-2xl font-semibold mb-1 text-gray-900 dark:text-gray-50">Actions</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">
            Define the habits or activities you want to track on your calendar.
        </p>

        <!-- Add action form -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-5 mb-6">
            <h3 class="text-sm font-medium text-gray-700 dark:text-gray-300 mb-3">New action</h3>
            <form hx-post="/actions"
                  hx-target="#actions-tbody"
                  hx-swap="afterbegin"
                  hx-on::after-request="if(event.detail.xhr.status===200) { document.getElementById('action-error').innerHTML=''; this.reset(); var er=document.getElementById('actions-empty-row'); if(er) er.remove(); var sh=document.getElementById('showing-shown'); var tot=document.getElementById('showing-total'); if(sh) sh.textContent=parseInt(sh.textContent,10)+1; if(tot) tot.textContent=parseInt(tot.textContent,10)+1; } else if(event.detail.xhr.status===409) { document.getElementById('action-error').innerHTML=event.detail.xhr.responseText; }"
                  class="flex items-center gap-3">
                <input type="color"
                       name="colour"
                       value="#6366f1"
                       class="w-9 h-9 rounded-lg border border-gray-200 dark:border-gray-600 cursor-pointer p-0.5 flex-shrink-0 bg-white dark:bg-gray-700"
                       title="Pick a colour">
                <input type="text"
                       name="name"
                       placeholder="Action name"
                       required
                       maxlength="100"
                       class="flex-1 min-w-0 rounded-lg border border-gray-300 dark:border-gray-600 px-3 py-2 text-sm
                              bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50
                              focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                <button type="submit"
                        class="bg-indigo-600 text-white rounded-lg px-4 py-2 text-sm font-medium
                               hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500
                               focus:ring-offset-2 dark:focus:ring-offset-gray-900 transition-colors flex-shrink-0">
                    Add
                </button>
            </form>
            <div id="action-error" class="mt-2"></div>
        </div>

        <!-- Search bar -->
        <div class="mb-4">
            <input type="text"
                   id="search-input"
                   name="q"
                   placeholder="Search actions…"
                   hx-get="/actions/list?page=1"
                   hx-target="#action-list"
                   hx-trigger="input changed delay:300ms"
                   hx-on="htmx:configRequest: event.detail.parameters.q = document.getElementById('search-input').value"
                   class="w-full rounded-lg border border-gray-300 dark:border-gray-600 px-3 py-2 text-sm
                          bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-50
                          focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
        </div>

        <!-- Action list -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 overflow-hidden">
            <div id="action-list">
                {#include partials/actions-list page=page extraQuery="" /}
            </div>
        </div>
    </main>
</div>

<script>
// The delete endpoint returns 204 with an empty body. Two things to handle here,
// rather than on the button itself (its outerHTML swap removes the button — and its
// own after-request listener — before that listener would fire):
//   1. htmx skips the swap on a 204 by default, but we rely on the outerHTML swap to
//      remove the deleted row, so force the swap.
//   2. Decrement the "Showing X of Y" counter to match the removed row.
document.body.addEventListener('htmx:beforeSwap', function (e) {
    if (e.detail.xhr.status === 204) {
        e.detail.shouldSwap = true;
        var sh = document.getElementById('showing-shown');
        var tot = document.getElementById('showing-total');
        if (sh) sh.textContent = parseInt(sh.textContent, 10) - 1;
        if (tot) tot.textContent = parseInt(tot.textContent, 10) - 1;
    }
});
</script>

{/body}

{/include}
