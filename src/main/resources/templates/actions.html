{#include layout.html}

{#body}
<div class="min-h-viewport flex flex-col">

    <!-- Navigation -->
    {#include partials/navbar active='actions' /}

    <!-- Content -->
    <main class="page-container px-4 py-8">
        <h2 class="text-2xl font-semibold mb-1 text-ink">Actions</h2>
        <p class="text-sm text-ink-muted mb-6">
            Define the habits or activities you want to track on your calendar.
        </p>

        <!-- Add action form -->
        <div class="card p-4 mb-6">
            <h3 class="card-title mb-3">New action</h3>
            <form hx-post="/actions"
                  hx-target="#actions-tbody"
                  hx-swap="afterbegin"
                  hx-on::after-request="if(event.detail.xhr.status===200) { document.getElementById('action-error').innerHTML=''; this.reset(); var er=document.getElementById('actions-empty-row'); if(er) er.remove(); var sh=document.getElementById('showing-shown'); var tot=document.getElementById('showing-total'); if(sh) sh.textContent=parseInt(sh.textContent,10)+1; if(tot) tot.textContent=parseInt(tot.textContent,10)+1; var section=document.getElementById('actions-section'); if(section) { section.dataset.total=parseInt(section.dataset.total,10)+1; section.classList.remove('hidden'); } } else if(event.detail.xhr.status===409) { document.getElementById('action-error').innerHTML=event.detail.xhr.responseText; }"
                  class="flex items-center gap-3">
                <input type="color"
                       name="colour"
                       value="#6366f1"
                       class="w-9 h-9 rounded-lg border border-line cursor-pointer p-0.5 shrink-0 bg-surface"
                       title="Pick a colour">
                <input type="text"
                       name="name"
                       placeholder="Action name"
                       required
                       maxlength="100"
                       class="form-input flex-1 min-w-0">
                <button type="submit" class="btn-primary shrink-0">
                    Add
                </button>
            </form>
            <div id="action-error" class="mt-2"></div>
        </div>

        <!-- Search + list. Hidden entirely when the user has NO actions at all, so an empty
             account shows only the "New action" card above. `data-total` tracks the UNFILTERED
             active-action count (page.totalCount is unfiltered here — the full page never carries
             a search term) so the surgical add/delete handlers can toggle this section without a
             reload. It stays visible while ANY action exists, even when the current search matches
             none — that case still shows the (empty) table. -->
        <div id="actions-section" data-total="{page.totalCount}" class="{#if page.totalCount == 0}hidden{/if}">
            <!-- Search bar -->
            <div class="mb-4">
                <input type="text"
                       id="search-input"
                       name="q"
                       placeholder="Search actions…"
                       hx-get="/actions/list?page=1"
                       hx-target="#action-list"
                       hx-trigger="input changed delay:300ms"
                       hx-on="htmx:configRequest: event.detail.parameters.q = document.getElementById('search-input').value"
                       class="form-input w-full">
            </div>

            <!-- Action list -->
            <div class="card overflow-hidden">
                <div id="action-list">
                    {#include partials/actions-list page=page extraQuery="" /}
                </div>
            </div>
        </div>
    </main>

    {#include partials/footer /}
</div>

<script>
// The delete endpoint returns 204 with an empty body. Handle the surgical removal here,
// rather than on the button itself (its outerHTML swap removes the button — and its own
// after-request listener — before that listener would fire):
//   1. htmx skips the swap on a 204 by default, but we rely on the outerHTML swap to remove
//      the deleted row, so force the swap.
//   2. Decrement the filtered "Showing X of Y" counter to match the removed row, and the
//      section's UNFILTERED data-total (one fewer action exists overall).
//   3. If no actions remain in the system (data-total <= 0), hide the whole search+list
//      section so only the "New action" card shows — matching a fresh empty-account render.
//   4. Otherwise, if the current (filtered) view is now empty — i.e. a search matches none of
//      the remaining actions — keep the table visible but add an empty-state row, so the
//      surgical path matches what a fresh search render shows.
document.body.addEventListener('htmx:beforeSwap', function (e) {
    if (e.detail.xhr.status === 204) {
        e.detail.shouldSwap = true;
        var sh = document.getElementById('showing-shown');
        var tot = document.getElementById('showing-total');
        if (sh) sh.textContent = parseInt(sh.textContent, 10) - 1;
        var filteredLeft = tot ? parseInt(tot.textContent, 10) - 1 : 0;
        if (tot) tot.textContent = filteredLeft;

        var section = document.getElementById('actions-section');
        var totalLeft = section ? parseInt(section.dataset.total, 10) - 1 : 0;
        if (section) section.dataset.total = totalLeft;

        if (totalLeft <= 0) {
            if (section) section.classList.add('hidden');
        } else if (filteredLeft <= 0) {
            var tbody = document.getElementById('actions-tbody');
            if (tbody && !document.getElementById('actions-empty-row')) {
                tbody.insertAdjacentHTML('beforeend',
                    '<tr id="actions-empty-row"><td colspan="3" class="dt-empty">No actions match your search.</td></tr>');
            }
        }
    }
});
</script>

{/body}

{/include}
