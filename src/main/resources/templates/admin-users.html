{#include layout.html}

{#body}
<div class="min-h-screen flex flex-col">

    <!-- Navigation -->
    {#include partials/navbar active='admin' /}

    <main class="flex-1 max-w-5xl mx-auto w-full px-4 py-8">
        <h2 class="text-2xl font-semibold mb-2 text-gray-900 dark:text-gray-50">User Management</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">
            Manage user accounts and roles.
        </p>

        <!-- Error target for inline HTMX errors -->
        <div id="admin-error" class="mb-4"></div>

        <!-- User table -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 overflow-hidden">
            <div id="admin-users-list">
                {#include partials/admin-users-list page=page /}
            </div>
        </div>
    </main>
</div>

{/body}

{/include}
