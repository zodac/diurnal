{#include layout.html}

{#body}
<div class="min-h-screen flex flex-col">

    <!-- Navigation -->
    {#include partials/navbar active='stats' /}

    <main class="flex-1 max-w-5xl mx-auto w-full px-4 py-8">
        <h2 class="text-2xl font-semibold mb-6 text-ink">Stats</h2>

        {#if page.totalCount == 0}
        <div class="card p-10 text-center">
            {#if hasActions}
            <p class="text-ink-muted">No logs for any actions yet.</p>
            {#else}
            <p class="text-ink-muted mb-3">No actions defined yet.</p>
            <a href="/actions" class="btn-primary">
                Add actions
            </a>
            {/if}
        </div>
        {#else}
        <div id="stats-list">
            {#include partials/stats-cards page=page /}
        </div>
        {/if}
    </main>
</div>

{/body}

{/include}
