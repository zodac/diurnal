<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
        Declares that this app ships its own light/dark themes. Browsers use it to
        theme native form controls/scrollbars, and dark-mode extensions (e.g. Dark
        Reader) read it as the standard signal that the page is already dark-aware,
        so they back off instead of layering a second dark filter on top. The
        content is kept in sync with the active theme by the FOUC script below and
        by the theme picker in settings.html.
    -->
    <meta name="color-scheme" content="light dark">
    <title>Life Tracker</title>
    <!--
        Resolve theme before body renders to prevent FOUC.
        'dark'   → always apply dark class.
        'light'  → always light.
        'system' → follow prefers-color-scheme media query.
    -->
    <script>
        (function () {
            var theme = '{theme}';
            var dark = theme === 'dark' ||
                (theme === 'system' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
            var scheme = dark ? 'dark' : (theme === 'system' ? 'light dark' : 'light');
            var meta = document.querySelector('meta[name="color-scheme"]');
            if (meta) meta.content = scheme;
            if (dark) {
                document.documentElement.classList.add('dark');
                document.documentElement.style.colorScheme = 'dark';
                document.head.insertAdjacentHTML('beforeend',
                    '<style id="theme-bg">body\{background-color:#111827!important;color:#f9fafb!important}</style>');
            } else {
                document.documentElement.style.colorScheme = scheme;
            }
        })();
    </script>
    <!--
        Tailwind is loaded from the Play CDN. The config MUST be assigned after the
        CDN script so the `tailwind` global exists; otherwise the assignment throws
        and Tailwind silently falls back to its default `darkMode: 'media'` strategy,
        which keys dark styling off the OS theme instead of the server-controlled
        `.dark` class on <html>.
    -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <!--
        Shared data-table ("dt") component styling. This is the single source of truth for
        how every list/table in the app looks: Actions, Users (admin), and any future tables.
        Tailwind is loaded from the Play CDN, which cannot process `@apply` at runtime, so these
        are written as plain CSS. Dark-mode variants key off the `.dark` class on <html>
        (Tailwind is configured `darkMode: 'class'`), matching the rest of the app.

        To add a new data table, wrap it in `.dt-table`, use `.dt-row`/`.dt-cell`, put row
        actions in a trailing `.dt-actions` cell with `.dt-btn-edit`/`.dt-btn-delete`, and
        reuse `partials/pagination.html`. Editable rows toggle in place via `[data-dt-view]` /
        `[data-dt-edit]` (dtStartEdit/dtCancelEdit) and the shared `partials/dt-row-actions.html`
        + `partials/dt-confirm-delete-row.html`; see the data-table section in CLAUDE.md. Both the
        edit and confirm rows draw the same `.dt-row-highlight` ring — only the colour differs
        (`--dt-highlight`, set by `.dt-row-edit` / `.dt-row-confirm`).
    -->
    <style>
        /*
            Smooth theme switching. The `.theme-transition` class is added to <html>
            only for the duration of a light↔dark switch (see settings.html), then
            removed, so the cross-fade never interferes with element-level hover
            transitions or the initial (FOUC-resolved) paint. Only colour-ish
            properties are transitioned to keep it cheap. `prefers-reduced-motion`
            users get the instant change.
        */
        .theme-transition, .theme-transition *, .theme-transition *::before, .theme-transition *::after {
            transition: background-color .3s ease, border-color .3s ease, color .3s ease,
                fill .3s ease, stroke .3s ease, box-shadow .3s ease !important;
            transition-delay: 0s !important;
        }
        @media (prefers-reduced-motion: reduce) {
            .theme-transition, .theme-transition *, .theme-transition *::before, .theme-transition *::after {
                transition: none !important;
            }
        }

        /* Table shell */
        .dt-table { width: 100%; font-size: .875rem; line-height: 1.25rem; }
        .dt-table thead tr { border-bottom: 1px solid #e5e7eb; }
        .dark .dt-table thead tr { border-bottom-color: #374151; }
        .dt-head-cell { padding: .75rem 1rem; text-align: left; font-size: .75rem; line-height: 1rem;
            font-weight: 500; color: #6b7280; text-transform: uppercase; letter-spacing: .025em; }
        .dark .dt-head-cell { color: #9ca3af; }
        .dt-tbody > tr + tr { border-top: 1px solid #f3f4f6; }
        .dark .dt-tbody > tr + tr { border-top-color: #374151; }

        /* Rows + cells */
        .dt-row { transition: background-color .15s; }
        .dt-row:hover { background-color: #f9fafb; }
        .dark .dt-row:hover { background-color: #374151; }
        .dt-cell { padding: .75rem 1rem; color: #111827; vertical-align: middle; }
        .dark .dt-cell { color: #f9fafb; }
        .dt-cell-muted { color: #6b7280; white-space: nowrap; }
        .dark .dt-cell-muted { color: #9ca3af; }
        .dt-cell-actions { width: 1%; white-space: nowrap; }

        /* Trailing action buttons. Each label sits in a fixed-width, centred slot, so swapping
           Edit↔Save and Delete↔Cancel (and the confirm row's Delete/Cancel) keeps every word in
           exactly the same place — the cursor never has to move. The two states always have the
           same two equal slots, right-aligned, so corresponding buttons line up. */
        .dt-actions { display: flex; justify-content: flex-end; align-items: center; gap: .5rem; }
        .dt-actions .dt-btn { min-width: 3.5rem; text-align: center; }
        /* View-mode actions stay subtle until the row is highlighted (hovered/focused); edit +
           confirm actions are always shown. On touch this works the same way: tapping a row applies
           the :hover state (sticky until another row is tapped), so the actions reveal on tap.
           While hidden they're `pointer-events: none`, so they can't be clicked/tapped until revealed
           (a tap on a hidden button falls through to the row, revealing it first); keyboard focus
           still works, so :focus-within can reveal them for keyboard users. */
        .dt-row [data-dt-view].dt-actions { opacity: 0; pointer-events: none; transition: opacity .15s; }
        .dt-row:hover [data-dt-view].dt-actions,
        .dt-row:focus-within [data-dt-view].dt-actions { opacity: 1; pointer-events: auto; }

        /* Colour swatch (Actions) */
        .dt-swatch { display: inline-block; width: 1rem; height: 1rem; border-radius: 9999px;
            flex-shrink: 0; border: 1px solid rgba(0,0,0,.1); }

        /* Buttons — shared across every table + the Settings account panel */
        .dt-btn { font-size: .75rem; line-height: 1rem; font-weight: 500; background: none; border: 0;
            padding: 0; cursor: pointer; transition: color .15s; }
        .dt-btn-edit { color: #9ca3af; } .dt-btn-edit:hover { color: #4f46e5; }
        .dark .dt-btn-edit { color: #6b7280; } .dark .dt-btn-edit:hover { color: #818cf8; }
        .dt-btn-delete { color: #9ca3af; } .dt-btn-delete:hover { color: #dc2626; }
        .dark .dt-btn-delete { color: #6b7280; } .dark .dt-btn-delete:hover { color: #f87171; }
        .dt-btn-save { color: #4f46e5; } .dt-btn-save:hover { color: #3730a3; }
        .dark .dt-btn-save { color: #818cf8; } .dark .dt-btn-save:hover { color: #a5b4fc; }
        .dt-btn-cancel { color: #6b7280; } .dt-btn-cancel:hover { color: #374151; }
        .dark .dt-btn-cancel { color: #9ca3af; } .dark .dt-btn-cancel:hover { color: #e5e7eb; }
        .dt-btn-danger { color: #dc2626; } .dt-btn-danger:hover { color: #991b1b; }
        .dark .dt-btn-danger { color: #f87171; } .dark .dt-btn-danger:hover { color: #fca5a5; }

        /* Row highlight ring — the single accent shared by every editable + confirm-delete row.
           Pass the colour in via the `--dt-highlight` variable (set by the row's mode class below,
           so it stays dark-aware). Drawn with an inset box-shadow, so it NEVER changes the row's
           size — identical behaviour whether it wraps a single colspan cell (:only-child) or a
           multi-column row (the ring is stitched from per-cell edges). */
        .dt-row-highlight > td { box-shadow: inset 0 1px 0 0 var(--dt-highlight), inset 0 -1px 0 0 var(--dt-highlight); }
        .dt-row-highlight > td:first-child { box-shadow: inset 0 1px 0 0 var(--dt-highlight), inset 0 -1px 0 0 var(--dt-highlight), inset 1px 0 0 0 var(--dt-highlight); }
        .dt-row-highlight > td:last-child { box-shadow: inset 0 1px 0 0 var(--dt-highlight), inset 0 -1px 0 0 var(--dt-highlight), inset -1px 0 0 0 var(--dt-highlight); }
        .dt-row-highlight > td:only-child { box-shadow: inset 0 0 0 1px var(--dt-highlight); }

        /* Highlight colours — each mode class supplies just the colour passed into the ring. */
        .dt-row-edit { --dt-highlight: #a5b4fc; }
        .dark .dt-row-edit { --dt-highlight: #4338ca; }
        .dt-row-confirm { --dt-highlight: #fca5a5; }
        .dark .dt-row-confirm { --dt-highlight: #b91c1c; }

        /* Edit rows hold inputs (taller than a text line), so give the inputs the row's line-height
           and trim the cell padding to match — the row keeps the SAME height as its view state, so
           the highlight doesn't appear to enlarge it (matching the confirm row's behaviour). */
        .dt-row-edit > td { padding-top: .625rem; padding-bottom: .625rem; }
        .dt-row-edit .dt-text-input, .dt-row-edit .dt-select { height: 1.5rem; box-sizing: border-box; }

        /* In-place confirm-delete cell — ring colour comes from .dt-row-confirm; this is padding only. */
        .dt-confirm-cell { padding: .75rem 1rem; }
        .dt-confirm-prompt { font-size: .75rem; color: #6b7280; }
        .dark .dt-confirm-prompt { color: #9ca3af; }

        /* Role/status badge */
        .dt-badge { font-size: .75rem; font-weight: 500; color: #6b7280; }
        .dark .dt-badge { color: #9ca3af; }
        .dt-badge-admin { color: #4f46e5; }
        .dark .dt-badge-admin { color: #818cf8; }

        /* Inputs used inside table edit rows + the Settings account panel */
        .dt-text-input { font-size: .875rem; border: 1px solid #d1d5db; border-radius: .5rem;
            padding: .25rem .5rem; background: #fff; color: #111827; }
        .dt-text-input:focus { outline: none; box-shadow: 0 0 0 2px #6366f1; border-color: transparent; }
        .dark .dt-text-input { border-color: #4b5563; background: #4b5563; color: #f9fafb; }
        .dt-color-input { width: 1.5rem; height: 1.5rem; border-radius: 9999px; border: 0; padding: 0;
            background: transparent; cursor: pointer; flex-shrink: 0; }
        .dt-select { font-size: .75rem; border: 1px solid #d1d5db; border-radius: .375rem; background: #fff;
            color: #111827; padding: .25rem 1.5rem .25rem .5rem; cursor: pointer; }
        .dt-select:focus { outline: none; box-shadow: 0 0 0 1px #6366f1; }
        .dark .dt-select { border-color: #4b5563; background: #374151; color: #f9fafb; }

        /* Empty state + pagination footer */
        .dt-empty { padding: 2rem 1rem; text-align: center; color: #6b7280; }
        .dark .dt-empty { color: #9ca3af; }
        .dt-pagination { padding: .75rem 1rem; border-top: 1px solid #e5e7eb; display: flex;
            align-items: center; justify-content: space-between; font-size: .75rem; color: #6b7280; }
        .dark .dt-pagination { border-top-color: #374151; color: #9ca3af; }
        .dt-page-link { color: #4f46e5; transition: color .15s; }
        .dt-page-link:hover { color: #3730a3; }
        .dark .dt-page-link { color: #818cf8; }
        .dark .dt-page-link:hover { color: #a5b4fc; }

        /* Inline message banners — shared by login/register pages and HTMX error responses
           (e.g. the admin user-management guards). Use `.banner` plus one variant modifier so
           every "something went wrong / succeeded" message reads identically. Rendered both
           from Qute (partials/banner.html) and from Java-built HTML, hence a plain CSS class. */
        .banner { border-radius: .5rem; border: 1px solid transparent;
            padding: .5rem .75rem; font-size: .875rem; line-height: 1.25rem; }
        .banner-error { background: #fef2f2; border-color: #fecaca; color: #b91c1c; }
        .dark .banner-error { background: rgb(127 29 29 / .2); border-color: #7f1d1d; color: #fecaca; }
        .banner-success { background: #f0fdf4; border-color: #bbf7d0; color: #15803d; }
        .dark .banner-success { background: rgb(20 83 45 / .2); border-color: #14532d; color: #bbf7d0; }
        .banner-warning { background: #fffbeb; border-color: #fde68a; color: #92400e; }
        .dark .banner-warning { background: rgb(120 53 15 / .2); border-color: #78350f; color: #fde68a; }
    </style>
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    {#insert head /}
</head>
<body class="min-h-screen bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-50"
      style="background-color:#f9fafb;color:#111827">
    {#insert body}Page content{/insert}

    <!-- Shared data-table behaviour (applies to every .dt-* table: Actions, Users, …).
         At most one row may be "armed" at a time — either waiting for a delete confirmation
         (a swapped-in .dt-row-confirm / .dt-row-edit row) or showing an inline edit form. An
         armed row always exposes a *visible* Cancel control (.dt-btn-cancel); inactive inline
         edit forms keep theirs hidden. So reverting an armed row is simply "click its visible
         Cancel", which restores the plain row (via hx-get or a local toggle). -->
    <script>
    // An editable row carries both a view state (elements marked [data-dt-view]) and a hidden
    // edit state ([data-dt-edit]). Entering/leaving edit mode is a pure client-side toggle —
    // Save submits the row's form, Cancel just restores the view. Shared by every editable table.
    window.dtStartEdit = function (row) {
        if (!row) return;
        row.classList.add('dt-row-highlight', 'dt-row-edit');
        row.querySelectorAll('[data-dt-view]').forEach(function (el) { el.classList.add('hidden'); });
        row.querySelectorAll('[data-dt-edit]').forEach(function (el) { el.classList.remove('hidden'); });
    };
    window.dtCancelEdit = function (row) {
        if (!row) return;
        row.classList.remove('dt-row-highlight', 'dt-row-edit');
        row.querySelectorAll('form').forEach(function (f) { f.reset(); });   // drop unsaved input
        row.querySelectorAll('[data-dt-edit]').forEach(function (el) { el.classList.add('hidden'); });
        row.querySelectorAll('[data-dt-view]').forEach(function (el) { el.classList.remove('hidden'); });
    };

    // Disarm every armed row except (optionally) one. "Armed" = mid edit or mid delete-confirm;
    // either way the row shows a visible Cancel (.dt-btn-cancel), so clicking it restores the row.
    // Exposed on window so page scripts can also call it (e.g. a delete rejected server-side).
    window.dtClearArmedRows = function (exceptRow) {
        document.querySelectorAll('tr .dt-btn-cancel').forEach(function (cancel) {
            var row = cancel.closest('tr');
            if (!row || row === exceptRow) return;
            if (cancel.offsetParent === null) return;   // hidden → this row isn't armed
            cancel.click();
        });
    };
    // Selecting another entry (clicking its Edit or Delete) disarms whatever was armed before.
    document.body.addEventListener('click', function (e) {
        var trigger = e.target.closest('.dt-btn-edit, .dt-btn-delete');
        if (trigger) window.dtClearArmedRows(trigger.closest('tr'));
    });
    </script>
</body>
</html>
