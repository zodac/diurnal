quarkus.application.name=diurnal
# Public source repository, linked from the page footer (version / license / source links).
app.repository.url=https://github.com/zodac-personal/diurnal
# IANA timezone used for all "today" calculations (streaks, since-labels, comparisons).
# Must match TZ in docker-compose.yml.
app.timezone=${TZ:UTC}

# --- HTTP ---
# Production listens on 8080 inside the container; docker-compose.yml maps ${APP_PORT:-8080} to it.
# Dev mode overrides this to 8081 (see application-dev.properties).
quarkus.http.port=8080
# Trust X-Forwarded-Proto / X-Forwarded-Host from the reverse proxy (Traefik) so that
# redirect URIs built by Quarkus (e.g. for OIDC) use https:// and the public hostname.
# SECURITY: only enable this when the container sits behind a trusted reverse proxy that
# strips/sets these headers. If the app is exposed directly, a client can spoof X-Forwarded-*
# (forging the OIDC redirect host and making isSSL() return true — see cookie note below), so
# this defaults to OFF. The reverse-proxy deployment turns it on via TRUST_X_FORWARDED_HEADERS=true
# (set in docker-compose.yml).
quarkus.http.proxy.proxy-address-forwarding=${TRUST_X_FORWARDED_HEADERS:false}

# On-the-wire gzip for the text assets that dominate transfer size — the self-hosted htmx script
# (~50 kB → ~16 kB), the compiled stylesheet (~47 kB → ~8 kB), and the SVG wordmarks (the login-page
# hero wordmark-readme.svg is ~54 kB of uncompressed XML → ~a few kB gzipped, served to every
# unauthenticated visitor). These are the real lever on footprint: the JS/CSS are already minified, so
# nothing further can be squeezed on disk; compression is what the client actually downloads. Scoped
# deliberately (NOT the default set) to static, secret-free assets: dynamic HTML/JSON is left
# uncompressed so that reflected request data + the session/CSRF cookies can never be combined into a
# BREACH oracle, and the woff2 fonts / raster icons are already compressed.
quarkus.http.enable-compression=true
quarkus.http.compress-media-types=text/css,text/javascript,image/svg+xml

# --- Database ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:diurnal_user}
quarkus.datasource.password=${DB_PASSWORD:diurnal_password}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:diurnal_db}
# Keep a couple of warm connections ready; cap at 10 (PostgreSQL default_connection limit is usually 100).
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.initial-size=2
quarkus.datasource.jdbc.max-size=10
# Validate on borrow so stale connections (e.g. after a DB restart) are replaced before reaching the app.
quarkus.datasource.jdbc.validate-on-borrow=true
quarkus.datasource.jdbc.background-validation-interval=5M
# Fail fast if the pool is exhausted rather than queuing forever.
quarkus.datasource.jdbc.acquisition-timeout=30
# Log a warning for connections held longer than 2 minutes — likely a leak.
quarkus.datasource.jdbc.leak-detection-interval=2M

# Per-profile datasource (and other) overrides live in application-dev.properties /
# application-test.properties — both point at the docker-compose.dev.yml "diurnal-db-dev" service (5432,
# database "diurnal_db").

# --- Flyway ---
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# --- Hibernate ---
quarkus.hibernate-orm.schema-management.strategy=none
# Use Hibernate's own (default Jackson) formatting for jsonb columns (e.g. User.stats_fields) rather
# than the REST-endpoint JSON facilities, which may be customised. This is the recommended setting and
# becomes the Quarkus default in a future release. See User.statsFields (@JdbcTypeCode SqlTypes.JSON).
quarkus.hibernate-orm.mapping.format.global=ignore

# --- Authentication switches ---
# Set PASSWORD_AUTH_ENABLED=false to disable the login form and rely on OIDC only.
# At least one of password or OIDC must be enabled; the app refuses to start otherwise.
password.auth.enabled=${PASSWORD_AUTH_ENABLED:true}
# Equalise login response time across existent and non-existent accounts. When true (default), a login
# for an email with no stored password hash still runs a BCrypt verification against a throwaway hash,
# so an attacker cannot enumerate which emails have accounts by timing the response. Set
# PASSWORD_AUTH_UNIFORM_TIMING=false to skip that work (faster, but leaks account existence via timing).
password.auth.uniform-timing.enabled=${PASSWORD_AUTH_UNIFORM_TIMING:true}
# Set ENABLE_REGISTRATION=false to prevent new password accounts being created via the UI.
# OIDC accounts are always provisioned automatically on first login regardless of this setting.
registration.enabled=${ENABLE_REGISTRATION:true}

# --- Per-account login throttling (form login + POST /api/auth/login) ---
# A per-ACCOUNT backoff to slow password-guessing against a single known account (per-IP limiting is
# the reverse proxy's job). After PASSWORD_AUTH_THROTTLE_MAX_ATTEMPTS consecutive failures for an
# email, that account is locked out for PASSWORD_AUTH_THROTTLE_LOCKOUT_DURATION; the API returns 429
# (+Retry-After) and the form redirects to the generic error page — a locked account is never
# disclosed. State is in-memory: it resets on restart and is not shared across instances.
# Set PASSWORD_AUTH_THROTTLE_ENABLED=false to disable entirely.
password.auth.throttle.enabled=${PASSWORD_AUTH_THROTTLE_ENABLED:true}
password.auth.throttle.max-attempts=${PASSWORD_AUTH_THROTTLE_MAX_ATTEMPTS:5}
# ISO-8601 duration, e.g. PT15M (15 minutes), PT30S, PT1H.
password.auth.throttle.lockout-duration=${PASSWORD_AUTH_THROTTLE_LOCKOUT_DURATION:PT5M}

# --- Per-IP login throttling (complements the per-account throttle above) ---
# After PASSWORD_AUTH_IP_THROTTLE_MAX_ATTEMPTS failures from a single client IP (across ANY accounts)
# within the window, that IP is locked out for PASSWORD_AUTH_IP_THROTTLE_LOCKOUT_DURATION — this slows a
# single host rotating through many accounts, which the per-account throttle can't catch. The client IP
# is taken from remoteAddress(), which honours TRUST_X_FORWARDED_HEADERS, so this is only meaningful
# behind a trusted proxy. The limit is deliberately higher than the per-account one because many users
# can share one IP (NAT/CGNAT); a counter decays after a quiet window so shared IPs don't accumulate.
# Set PASSWORD_AUTH_IP_THROTTLE_ENABLED=false to disable.
password.auth.ip-throttle.enabled=${PASSWORD_AUTH_IP_THROTTLE_ENABLED:true}
password.auth.ip-throttle.max-attempts=${PASSWORD_AUTH_IP_THROTTLE_MAX_ATTEMPTS:15}
password.auth.ip-throttle.lockout-duration=${PASSWORD_AUTH_IP_THROTTLE_LOCKOUT_DURATION:PT15M}

# Lazy (non-proactive) authentication: a request is only authenticated when the target endpoint
# actually requires it. This is REQUIRED for the form + OIDC combination below: protected UI pages
# must accept EITHER a diurnal_session (form) OR a q_session (OIDC) cookie, so they must not be pinned
# to a single auth-mechanism. A path pinned to one mechanism only authenticates with that mechanism
# — pinning the ui paths to "form" (a previous revision did this) meant the OIDC session cookie was
# never honoured on /. So an OIDC user was bounced back to /login after a successful login at the IdP.
quarkus.http.auth.proactive=false

# Per-surface authentication. All non-pinned paths are authenticated by SessionAuthMechanism, which
# resolves the opaque server-side session token from either the diurnal_session cookie (web UI) or an
# Authorization: Bearer header (REST API). A permission's auth-mechanism restricts BOTH which
# mechanism may authenticate a matching request AND which one challenges an anonymous one, so we pin
# only the surface that must be exclusive:
#
#   - OIDC trigger (/oidc-login) + callback (/oauth2/callback/oidc) -> code flow only, so an
#     anonymous hit on /oidc-login redirects to the IdP and the IdP's redirect back is processed.
#
# The web UI is deliberately NOT pinned: the session cookie (diurnal_session) or, during the OIDC
# handshake, the code mechanism must be able to authenticate there. Anonymous UI requests are steered
# to /login by SessionAuthMechanism (see its Javadoc), not by pinning. @RolesAllowed on each endpoint
# enforces authorisation.
#
# The REST API (/api/*) is likewise NOT pinned. It authenticates with the same opaque session token
# sent as a Bearer header (from POST /api/auth/login), or the web session cookie for a browser reusing
# an existing session. Anonymous /api/* requests get a plain 401 (not the browser /login redirect) —
# see SessionAuthMechanism.challengeFor.
#
# HTTP Basic is deliberately NOT enabled: it would run BCrypt (cost 12, ~200-300ms) on EVERY /api/*
# request carrying an 'Authorization: Basic' header, making the API both an unthrottled
# password-guessing surface and a cheap CPU-exhaustion lever. Session-token resolution is a cheap
# hashed-index lookup (no per-request BCrypt), so the API relies on it exclusively.
quarkus.http.auth.permission.api.paths=/api/*
quarkus.http.auth.permission.api.policy=permit

quarkus.http.auth.permission.oidc-trigger.paths=/oidc-login,/oauth2/callback/oidc
quarkus.http.auth.permission.oidc-trigger.policy=authenticated
quarkus.http.auth.permission.oidc-trigger.auth-mechanism=code

# Public auth surface: the login form POST (handled by WebResource.doLogin), registration, logout and
# the first-run setup landing page (/welcome). Permitted (no auth needed to reach them) and NOT pinned,
# since WebResource now owns POST /login directly.
quarkus.http.auth.permission.form.paths=/login*,/register*,/logout*,/welcome*
quarkus.http.auth.permission.form.policy=permit

quarkus.http.auth.permission.health.paths=/health
quarkus.http.auth.permission.health.policy=permit

# Protected application pages. NOT pinned: the diurnal_session (session) cookie OR a q_session (OIDC)
# cookie may authenticate them — @RolesAllowed on each endpoint triggers lazy auth. Anonymous requests
# are redirected to /login by SessionAuthMechanism, a custom HttpAuthenticationMechanism that outranks
# the OIDC mechanism (default priority 1000) so browsers get the login page instead of a 401.
quarkus.http.auth.permission.ui.paths=/,/settings*,/actions*,/logs*,/stats*
quarkus.http.auth.permission.ui.policy=permit

# Admin pages: same permit pattern as ui — @RolesAllowed("admin") on every AdminWebResource method
# enforces the role check. A named HTTP roles-allowed policy interacts poorly with proactive=false
# (the lazy identity isn't loaded when the HTTP layer checks, so it can silently pass or block both
# admins and non-admins). SessionAuthMechanism handles unauthenticated redirects.
quarkus.http.auth.permission.admin-ui.paths=/admin*
quarkus.http.auth.permission.admin-ui.policy=permit

# Web-UI session cookie (diurnal_session) is now issued by WebResource.doLogin, not Quarkus form auth:
# it is a random opaque token (a handle into the `sessions` table), set HttpOnly + SameSite=Strict, with
# Secure derived from the request scheme (isSSL(), honouring X-Forwarded-Proto behind the proxy) and a
# max-age matching session.absolute-timeout. Lifetimes and the cookie name live in the `session.*`
# block below; there is no encrypted-cookie key to configure (the token carries no state to encrypt).

# --- Sessions (server-side session store) ---
# Both the web UI cookie and the REST API Bearer token are opaque handles into the `sessions` table,
# so they are revocable (logout, password change, "log out everywhere"). A session is valid until
# either bound is crossed. Durations are ISO-8601 (e.g. P30D, P7D, PT12H).
session.idle-timeout=${SESSION_IDLE_TIMEOUT:P30D}
session.absolute-timeout=${SESSION_ABSOLUTE_LIFETIME:P90D}
# How often the SessionSweeper deletes absolute-expired rows.
session.cleanup-interval=${SESSION_CLEANUP_INTERVAL:PT1H}
session.cookie-name=diurnal_session

# --- OpenAPI / Swagger UI ---
# Interactive API documentation for the REST surface (/api/*). Served in ALL profiles (Quarkus only
# bundles Swagger UI in dev by default, hence always-include) at /api, so the docs sit at the root of
# the API namespace they document. This does NOT clash with the JAX-RS endpoints under /api/* (e.g.
# /api/auth/login): the Swagger UI handler serves its own asset paths, the REST resources keep theirs.
# /api is covered by the "api" permission block above (policy=permit), so at the HTTP-permission
# layer the docs are unpinned; OpenApiDocsAuthFilter (a low-order Vert.x route) then gates BOTH the
# Swagger UI shell (/api) and the OpenAPI document (/q/openapi) behind the admin role, so the API
# surface is not anonymously enumerable. The documented endpoints still enforce their own auth too.
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/api
# Disable Swagger UI's spec "validator badge". By default, it renders an <img> from the public
# validator.swagger.io with our spec URL — but /q/openapi isn't publicly reachable, so the badge
# always comes back as a broken "invalid" icon at the foot of the docs. Turn it off entirely.
quarkus.swagger-ui.validator-url=none
# Swagger UI ships ~2 MB of static assets (the bundle JS, presets, CSS, fonts/images) that never change
# for a given build, but are served with no cache headers. So the embedded docs re-download the whole
# amount on every visit (the ~1-2s load). Attach a long-lived Cache-Control to just those static assets so
# the browser reuses them after the first load. The regex matches by file extension, so it never touches
# the JSON REST endpoints under the same /api/* namespace (e.g. /api/auth/login — no extension) nor the
# Swagger index HTML / the /q/openapi document (which can change between deployments).
quarkus.http.filter.swagger-ui-assets.matches=/api/.+\\.(js|css|png|gif|svg|ico|woff2?|ttf|eot|map)
quarkus.http.filter.swagger-ui-assets.header.Cache-Control=public, max-age=86400
quarkus.http.filter.swagger-ui-assets.methods=GET,HEAD
# The app's own compiled/generated static assets (images, fonts) are baked into the Docker image
# and never change between requests — same "never changes for a given build" argument as the
# Swagger filter above. Without this, the browser has no cache directive and re-fetches every file
# on each reference: the settings gallery shows 7 WebP thumbnails and each gallery iteration
# re-requests the same images because the modal and the thumbnail are separate <img> elements.
# Fonts are likewise large (~200 kB each) and completely static.
# CSS is handled separately below: its filename is content-hashed at build time, so it can be cached
# far more aggressively (immutable) than these stable-URL img/fonts assets, which keep a 1-day ceiling
# because a redeployment that changes them reuses the same URL.
quarkus.http.filter.app-assets.matches=/(img|fonts)/.+
quarkus.http.filter.app-assets.header.Cache-Control=public, max-age=86400
quarkus.http.filter.app-assets.methods=GET,HEAD
# The compiled stylesheet is served under a content-hashed filename (app.<hash>.css — the Dockerfile
# renames it and bakes the name into AppInfo.cssFile, which layout.html references). Because a new
# build yields a new URL, the file at any given URL never changes: cache it for a year as `immutable`
# so browsers and reverse proxies/CDNs skip even a revalidation request. Dev overrides this to
# `no-store` (application-dev.properties), where the filename is the un-hashed app.css.
quarkus.http.filter.app-css.matches=/css/.+
quarkus.http.filter.app-css.header.Cache-Control=public, max-age=31536000, immutable
quarkus.http.filter.app-css.methods=GET,HEAD
# The self-hosted htmx script is served under a content-hashed filename (htmx.<hash>.min.js — the
# Dockerfile renames it and bakes the name into AppInfo.jsFile, which layout.html references), exactly
# like the stylesheet above: a new build yields a new URL, so cache it for a year as `immutable`. Dev
# overrides this to `no-store` (application-dev.properties), where the filename is the un-hashed
# htmx.min.js.
quarkus.http.filter.app-js.matches=/js/.+
quarkus.http.filter.app-js.header.Cache-Control=public, max-age=31536000, immutable
quarkus.http.filter.app-js.methods=GET,HEAD
# HTML pages (and HTMX partials) are dynamic and must always reflect the current deploy — most
# importantly, they carry the hashed /css/ URL, so a stale page would point a client at a stale
# stylesheet. Mark every non-asset, non-API path `no-cache` so a reverse proxy/CDN revalidates rather
# than serving an old page. The negative lookahead excludes the fingerprinted/long-cached static
# assets and the API/framework namespaces handled above; everything else (/, /login, /settings, the
# HTMX partial routes, …) is the dynamic web UI.
quarkus.http.filter.html-pages.matches=/(?!css/|js/|img/|fonts/|api/|q/|favicon\\.ico|manifest\\.json|health).*
quarkus.http.filter.html-pages.header.Cache-Control=no-cache
quarkus.http.filter.html-pages.methods=GET,HEAD
# The OpenAPI document Swagger UI renders stays at the framework path /q/openapi.
# Limit the document to the public API: the /api/* namespace plus the deliberately-published app
# endpoints (e.g. /logs/events). PublicApiFilter strips the web UI's HTML page and HTMX partial routes
# that SmallRye would otherwise scan in (they return text/html, not JSON).
mp.openapi.filter=net.zodac.diurnal.openapi.PublicApiFilter
# API title/version/description live in the @OpenAPIDefinition on net.zodac.diurnal.openapi.DiurnalApiDefinition
# (alongside the security schemes below), not in quarkus.smallrye-openapi.info-* config.
# The API's sole auth scheme (BearerAuth = HTTP bearer, an opaque session token) is declared as a @SecurityScheme
# annotation on net.zodac.diurnal.openapi.DiurnalApiDefinition rather than via the
# quarkus.smallrye-openapi.security-scheme* config, so it is pinned to a plain HTTP bearer scheme.
# auto-add-security=false stops Quarkus auto-deriving an EXTRA scheme from the enabled security
# extensions — with OIDC enabled that adds an 'openIdConnect' Authorize option, which we do not
# want; only the single scheme declared above should appear.
quarkus.smallrye-openapi.auto-add-security=false
# Also stop auto-stamping every secured operation with a generic security requirement + 401/403
# responses: each documented operation declares its real responses and auth explicitly (via
# @APIResponse / @SecurityRequirement) so the listed status codes match what the endpoint returns.
quarkus.smallrye-openapi.auto-add-security-requirement=false

# --- OIDC ---
# The OIDC extension must be enabled at BUILD TIME so its CDI beans and auth mechanism are
# registered. Runtime enable/disable is via quarkus.oidc.tenant-enabled (a runtime property).
# When tenant-enabled=false Quarkus skips discovery and the mechanism is inactive.
quarkus.oidc.enabled=true
quarkus.oidc.tenant-enabled=${OIDC_ENABLED:false}
# Placeholder prevents Quarkus startup failure when OIDC is disabled and no URL is configured.
quarkus.oidc.auth-server-url=${OIDC_ISSUER_URL:http://disabled.invalid}
quarkus.oidc.client-id=${OIDC_CLIENT_ID:diurnal}
quarkus.oidc.credentials.client-secret.value=${OIDC_CLIENT_SECRET:}
quarkus.oidc.credentials.client-secret.method=post
# Always web-app type: when OIDC is disabled the extension is fully inert so this has no effect.
quarkus.oidc.application-type=web-app
# Request email, profile, and groups claims. openid is added automatically by Quarkus; only list the
# additional scopes here. The groups scope is needed so Authelia/LLDAP includes group membership.
quarkus.oidc.authentication.scopes=email,profile,groups
# Fetch the UserInfo endpoint after login. Authelia (and many IdPs) return email/name from
# UserInfo rather than embedding them in the ID token, even when the email scope is granted —
# OidcUserProvisioner needs the email to provision the local user on first OIDC login.
quarkus.oidc.authentication.user-info-required=true
# Pin the redirect_uri to / so you only need to register one callback URL with your IdP.
quarkus.oidc.authentication.redirect-path=/oauth2/callback/oidc
# Redirect to the login page with an error indicator when OIDC authentication fails
# (e.g. token validation failure, or the user is not in an authorised group).
quarkus.oidc.authentication.error-path=/login?error=oidc
# Session persistence — keep OIDC sessions as long-lived as the form/password session (P90D).
# By default, a Quarkus web-app session ends at the ID token's expiry (often ~1h) with no refresh,
# logging OIDC users out far sooner than password users. These three settings close that gap:
#   1. refresh-expired: when the access/ID token expires, silently refresh it using the stored
#      refresh token instead of forcing an IdP round-trip.
#   2. refresh-token-time-skew: grace period — refresh proactively this long BEFORE expiry, on the
#      live request, so an active user never trips an already-expired token mid-session.
#   3. session-age-extension: keep the q_session cookie (and thus the refresh token) usable across
#      idle time, beyond the short ID-token expiry. Set to match the form timeout / your IdP's
#      refresh-token lifetime (Authelia default: 90 days).
# The q_session token state is encrypted with a key derived from the (stable) client secret, so the
# session also survives an app restart/upgrade — no extra config needed for that.
quarkus.oidc.token.refresh-expired=true
quarkus.oidc.token.refresh-token-time-skew=5M
quarkus.oidc.authentication.session-age-extension=P90D
# RP-initiated logout
oidc.logout.url=${OIDC_LOGOUT_URL}
# Display name for the IdP shown in the login button, e.g. "Log in with Authelia".
oidc.provider.name=${OIDC_PROVIDER_NAME:your identity provider}
# LDAP group names that map to admin/user roles for OIDC-provisioned accounts.
# When not set, the first-user-admin rule applies; all others default to user.
# oidc.admin.group=${OIDC_ADMIN_GROUP}
# oidc.user.group=${OIDC_USER_GROUP}
# If true, /login immediately redirects to the OIDC flow rather than showing the login page.
# Only applies when OIDC_ENABLED=true. Suppressed when ?error or ?registered params are present.
oidc.auto.redirect=${OIDC_AUTO_REDIRECT:false}

# --- Logging ---
# Twelve-Factor (XI. Logs): the app is a Docker image, so logs are an unbuffered event stream to the
# console (stdout) only — never a file. The console handler is on; the file handler stays off.
quarkus.log.console.enabled=true
quarkus.log.file.enabled=false
# Console line format. This is the Quarkus's backend syntax, NOT Log4j2's:
# %d=timestamp (zone follows TZ / app.timezone), %-5p=level, %c=logger name, %s=message,
# %e=exception, %n=newline. The thread (%t) is intentionally omitted; for a shorter logger use
# %c{3.} (n.z.d.AppLifecycle). The committed log4j2.xml mirrors this in Log4j2 syntax.
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} [%-5p] [%c] %s%e%n
# Colourise the bracketed level per level. Quarkus only emits ANSI when the console supports colour
# (off when stdout is piped, e.g. captured by Docker), so force it on; set false if a downstream log
# sink cannot cope with ANSI escapes.
quarkus.console.color=true
# LOG_LEVEL controls net.zodac.diurnal.* only; Quarkus/framework noise stays at WARN.
# Prod default: INFO. Set LOG_LEVEL=DEBUG to see login events and detailed traces.
quarkus.log.level=WARN
quarkus.log.category."net.zodac.diurnal".level=${LOG_LEVEL:INFO}
quarkus.log.category."org.flywaydb".level=INFO
