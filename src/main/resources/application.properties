quarkus.application.name=life-tracker
# IANA timezone used for all "today" calculations (streaks, since-labels, comparisons).
# Must match TZ in docker-compose.yml.
app.timezone=${TZ:UTC}

# --- HTTP ---
quarkus.http.port=8080

# --- Database ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:lifetracker}
quarkus.datasource.password=${DB_PASSWORD:lifetracker}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:lifetracker}

# Dev: connect to the PostgreSQL started by docker-compose.dev.yml (no Testcontainers)
%dev.quarkus.datasource.devservices.enabled=false
%dev.quarkus.datasource.username=lifetracker
%dev.quarkus.datasource.password=lifetracker
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/lifetracker

# Test: connect to the dedicated test DB started by docker-compose.test.yml
%test.quarkus.datasource.devservices.enabled=false
%test.quarkus.datasource.username=lifetracker
%test.quarkus.datasource.password=lifetracker
%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/lifetracker_test
# Force UTC in tests regardless of host TZ env var; prevents tomorrow/future-date tests from
# being affected by the host timezone (e.g. UTC+12 where "tomorrow UTC" is already "today").
%test.app.timezone=UTC

# --- Flyway ---
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# --- Hibernate ---
quarkus.hibernate-orm.database.generation=none

# --- Authentication switches ---
# Set PASSWORD_AUTH_ENABLED=false to disable the login form and rely on OIDC only.
# At least one of password or OIDC must be enabled; the app refuses to start otherwise.
password.auth.enabled=${PASSWORD_AUTH_ENABLED:true}

# Without this, SmallRye JWT (Bearer) challenges with 401 before form auth can redirect to /login.
quarkus.http.auth.proactive=false

# Bind each surface to its authentication mechanism so the right challenge is sent to
# anonymous callers. Without this the Bearer mechanism wins every challenge and browser
# requests get a 401 instead of being redirected to the login page.
#   - REST API (/api/*) -> Bearer JWT, so unauthenticated API calls get a 401.
#   - Web UI (everything else) -> form auth, so unauthenticated page loads redirect to /login.
# The policy is "permit" because endpoint-level @RolesAllowed/@Authenticated still enforce
# authorization; these entries only select which mechanism handles the challenge per path.
quarkus.http.auth.permission.api.paths=/api/*
quarkus.http.auth.permission.api.policy=permit
quarkus.http.auth.permission.api.auth-mechanism=bearer

quarkus.http.auth.permission.ui.paths=/*
quarkus.http.auth.permission.ui.policy=permit
quarkus.http.auth.permission.ui.auth-mechanism=form

# --- Form-based authentication (web UI) ---
quarkus.http.auth.form.enabled=true
quarkus.http.auth.form.login-page=/login
quarkus.http.auth.form.error-page=/login?error=true
quarkus.http.auth.form.landing-page=/
quarkus.http.auth.form.post-location=/login
quarkus.http.auth.form.username-parameter=email
quarkus.http.auth.form.password-parameter=password
quarkus.http.auth.form.cookie-name=lt_session
quarkus.http.auth.form.timeout=PT24H
quarkus.http.auth.form.new-cookie-interval=PT24H
# Logout is handled by POST /logout in WebResource — no built-in config in this Quarkus version
# Encrypt the session cookie. Must be at least 16 chars; override in production.
quarkus.http.auth.session.encryption-key=${SESSION_ENCRYPTION_KEY:devkey_change_for_production!!}

# --- JWT (for REST API / future OIDC) ---
# Keys are loaded from classpath in dev (src/main/resources/jwt-keys/).
# Override with env vars in production pointing to mounted files.
mp.jwt.verify.issuer=life-tracker
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION:jwt-keys/public.pem}
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_LOCATION:jwt-keys/private.pem}
smallrye.jwt.new-token.issuer=life-tracker
smallrye.jwt.new-token.lifespan=86400

# --- OIDC ---
# Disabled by default. Set OIDC_ENABLED=true and supply the three OIDC_* vars to activate.
# When disabled, the extension is fully inert — form/JWT auth is used exclusively.
quarkus.oidc.enabled=${OIDC_ENABLED:false}
quarkus.oidc.auth-server-url=${OIDC_ISSUER_URL:}
quarkus.oidc.client-id=${OIDC_CLIENT_ID:life-tracker}
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET:}
quarkus.oidc.application-type=service

# --- Logging ---
# LOG_LEVEL controls dev.lifetracker.* only; Quarkus/framework noise stays at WARN.
# Prod default: INFO. Set LOG_LEVEL=DEBUG to see login events and detailed traces.
quarkus.log.level=WARN
quarkus.log.category."dev.lifetracker".level=${LOG_LEVEL:INFO}
%dev.quarkus.log.category."dev.lifetracker".level=${LOG_LEVEL:DEBUG}

# --- OpenAPI (dev only) ---
%dev.quarkus.swagger-ui.always-include=true
