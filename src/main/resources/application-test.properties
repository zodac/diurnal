# Test-profile overrides. Loaded only when the "test" profile is active, on top of the base
# application.properties. Keys here need no "%test." prefix.
#
# NOTE: this file MUST live in src/main/resources (not src/test/resources) so it is packaged into
# the jar. The `mvn ... -Dall` E2E step runs the packaged jar with -Dquarkus.profile=test, which
# only sees config on the runtime classpath; src/test/resources is not packaged.

# --- Database ---
# Connect to the DB (the diurnal-db-dev service in docker-compose.dev.yml).
quarkus.datasource.devservices.enabled=false
quarkus.datasource.username=diurnal_user
quarkus.datasource.password=diurnal_password
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/diurnal_db

# Force UTC in tests regardless of host TZ env var; prevents tomorrow/future-date tests from
# being affected by the host timezone (e.g. UTC+12 where "tomorrow UTC" is already "today").
app.timezone=UTC

# Disable OIDC logout redirect in tests so logout always goes to /login regardless of env vars.
oidc.logout.url=

# Force registration on in tests regardless of a host ENABLE_REGISTRATION env var, so the
# registration ITs are deterministic. Tests that need it off override this at the profile level
# (see RegistrationDisabledProfile), which takes precedence over this file.
registration.enabled=true

# Per-IP throttling shares one key (loopback) across every IT running in the same JVM, which would make
# unrelated tests interfere. Keep it OFF by default here so the per-account throttle ITs stay
# deterministic; IpLoginThrottleIT turns it on via its own @TestProfile to exercise it in isolation.
password.auth.ip-throttle.enabled=false

# Argon2id at production cost (64 MiB, 3 passes) would add ~300ms and 64 MiB per hash to every
# registration/login test. Use minimal cost here (kept in sync with IntegrationTestBase's seed hashes) so
# the suite and the packaged E2E jar stay fast; production cost is exercised by the deployment-smoke tier.
password.hash.argon2.memory-kib=1024
password.hash.argon2.iterations=1
password.hash.argon2.parallelism=1
