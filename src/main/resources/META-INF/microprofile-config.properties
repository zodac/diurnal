# Build-time values, filtered in by the maven-resources-plugin at package time (see the <resources>
# block in pom.xml). This file is filtered in ISOLATION — application.properties is NOT filtered, so
# its own ${...} config expressions (e.g. ${TZ:UTC}) are left untouched. Read as a standard
# MicroProfile config source (lower ordinal than application.properties).

# Maven's build timestamp (ISO-8601, UTC, leading yyyy). net.zodac.diurnal.web.AppInfo takes the
# leading year for the page footer, so the year tracks the build rather than the server clock.
# Falls back to AppInfo's default when unfiltered (e.g. an un-packaged dev run).
app.build.timestamp=${maven.build.timestamp}
