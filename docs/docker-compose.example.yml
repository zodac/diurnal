# Example Docker Compose file for running Diurnal.
#
# Quick start:
#   1. Copy this file to `docker-compose.yml`
#   2. Set DB_PASSWORD below (use a long, random value)
#   3. Run: docker compose up -d
#   4. Open http://localhost:8080 and register the first account (it becomes the administrator)
#
# See the README for the full list of environment variables.

networks:
  diurnal:
    name: diurnal
    driver: bridge

services:

  diurnal:
    image: zodac/diurnal:latest
    container_name: diurnal
    hostname: diurnal
    depends_on:
      diurnal-db:
        condition: service_healthy
    environment:
      # --- Database connection (must match the diurnal-db service below) ---
      DB_HOST: diurnal-db
      DB_PORT: 5432
      DB_NAME: diurnal_db
      DB_USER: diurnal_user
      DB_PASSWORD: change-me-strong-password        # <-- CHANGE ME
      TZ: UTC
      LOG_LEVEL: INFO
      ENABLE_REGISTRATION: "true"
      # Trust X-Forwarded-* from your reverse proxy (needed for https:// OIDC redirects and Secure
      # cookies). Only keep this "true" if a trusted proxy fronts the app; set "false" if exposed directly.
      TRUST_X_FORWARDED_HEADERS: "true"
    networks:
      - diurnal
    ports:
      - "8080:8080"
    restart: unless-stopped

  diurnal-db:
    image: postgres:18.4-alpine
    container_name: diurnal-db
    hostname: diurnal-db
    environment:
      TZ: UTC
      POSTGRES_DB: diurnal_db
      POSTGRES_USER: diurnal_user
      POSTGRES_PASSWORD: change-me-strong-password   # <-- CHANGE ME (match DB_PASSWORD above)
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U diurnal_user -d diurnal_db" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s
      start_interval: 5s
    networks:
      - diurnal
    restart: unless-stopped
    volumes:
      - diurnal-db_data:/var/lib/postgresql/

volumes:
  diurnal-db_data:
    name: diurnal-db_data
