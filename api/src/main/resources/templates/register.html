{#include layout.html}

{#body}
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 w-full max-w-sm p-8">

        <h1 class="text-2xl font-semibold mb-1">Life Tracker</h1>
        <p class="text-sm text-gray-500 mb-6">Create a new account</p>

        {#if error.equals("email_taken")}
        <div class="mb-4 rounded-lg bg-red-50 border border-red-200 px-3 py-2 text-sm text-red-700">
            That email is already registered.
        </div>
        {#else if error.equals("invalid")}
        <div class="mb-4 rounded-lg bg-red-50 border border-red-200 px-3 py-2 text-sm text-red-700">
            Please fill in all fields. Password must be at least 8 characters.
        </div>
        {/if}

        <form method="post" action="/register" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="email">Email</label>
                <input id="email" type="email" name="email" required autocomplete="email"
                       class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm
                              focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="displayName">Display name</label>
                <input id="displayName" type="text" name="displayName" required autocomplete="name"
                       class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm
                              focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
                <input id="password" type="password" name="password" required autocomplete="new-password"
                       minlength="8"
                       class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm
                              focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
            </div>
            <button type="submit"
                    class="w-full bg-indigo-600 text-white rounded-lg px-4 py-2 text-sm font-medium
                           hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500
                           focus:ring-offset-2 transition-colors">
                Create account
            </button>
        </form>

        <p class="mt-4 text-center text-sm text-gray-500">
            Already have an account?
            <a href="/login" class="text-indigo-600 hover:underline font-medium">Sign in</a>
        </p>
    </div>
</div>
{/body}

{/include}
