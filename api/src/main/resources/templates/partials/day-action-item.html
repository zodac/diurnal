<div id="log-{date}-{action.id}"
     class="flex items-center justify-between px-2 py-2 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors">

    <div class="flex items-center gap-2 min-w-0 flex-1">
        <span class="w-3 h-3 rounded-full flex-shrink-0 border border-black/10"
              style="background-color: {action.colour}"></span>
        <span class="text-sm text-gray-800 dark:text-gray-200 truncate">{action.name}</span>
    </div>

    <div class="flex items-center gap-0.5 flex-shrink-0">
        <!-- Decrement -->
        <button {#if count == 0}disabled{/if}
                hx-post="/logs/{date}/{action.id}/decrement"
                hx-target="#log-{date}-{action.id}"
                hx-swap="outerHTML"
                title="Decrease"
                class="w-7 h-7 flex items-center justify-center rounded text-lg font-medium transition-colors
                       {#if count == 0}text-gray-200 dark:text-gray-600 cursor-not-allowed{#else}text-gray-400 dark:text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-500 hover:text-gray-700 dark:hover:text-gray-200{/if}">
            −
        </button>

        <!-- Count -->
        <span class="w-7 text-center text-sm font-semibold tabular-nums select-none
                     {#if count == 0}text-gray-300 dark:text-gray-600{#else}text-gray-800 dark:text-gray-200{/if}">
            {count}
        </span>

        <!-- Increment -->
        <button {#if count >= 255}disabled{/if}
                hx-post="/logs/{date}/{action.id}/increment"
                hx-target="#log-{date}-{action.id}"
                hx-swap="outerHTML"
                title="{#if count >= 255}Maximum reached{#else}Increase{/if}"
                class="w-7 h-7 flex items-center justify-center rounded text-lg font-medium transition-colors
                       {#if count >= 255}text-gray-200 dark:text-gray-600 cursor-not-allowed{#else}text-indigo-600 dark:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900 hover:text-indigo-700 dark:hover:text-indigo-300{/if}">
            +
        </button>
    </div>
</div>
